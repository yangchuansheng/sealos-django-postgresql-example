apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: sealos-django-postgresql-example
spec:
  title: Sealos Django PostgreSQL Example
  url: https://github.com/yangchuansheng/sealos-django-postgresql-example
  gitRepo: https://github.com/yangchuansheng/sealos-django-postgresql-example
  author: yangchuansheng
  description: Controlled Django and PostgreSQL practice source with a pinned Python 3.12 runtime.
  templateType: inline
  locale: en
  categories:
    - backend
    - database
  defaults:
    app_name:
      type: string
      value: django-${{ random(8) }}
    app_host:
      type: string
      value: django-${{ random(8) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
  annotations:
    sourceRepository: https://github.com/yangchuansheng/sealos-django-postgresql-example
    sourceCommit: 528dfe3851b1b199b027b8cbb95497ec0e7065d9
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}
          image: ghcr.io/yangchuansheng/sealos-django-postgresql-example:p24-python-practice-20260715-django-baseline
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-config
                  key: secret-key
            - name: DJANGO_ALLOWED_HOSTS
              value: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-database
                  key: host
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-database
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-database
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-database
                  key: password
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health/
              port: 8000
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  selector:
    app: ${{ defaults.app_name }}
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 80
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
